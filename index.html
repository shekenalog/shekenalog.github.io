<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サーモンラン記録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>サーモンラン記録</h1>
  </header>

  <main>
    <section id="record-form">
      <h2>記録を追加</h2>
      <form id="form">
        <label for="date">日付</label>
        <input type="date" id="date" required>

        <label for="stage">ステージ</label>
        <select id="stage" required>
          <option value="">選択してください</option>
        </select>

        <label for="hazard-level">キケン度</label>
        <input type="number" id="hazard-level" min="0" max="333" required>

        <label for="golden-eggs">金イクラ</label>
        <input type="number" id="golden-eggs" min="0" required>

        <label for="result">結果</label>
        <select id="result" required>
          <option value="">選択してください</option>
          <option value="clear">クリア</option>
          <option value="fail">失敗</option>
        </select>

        <button type="submit">記録する</button>
      </form>
    </section>

    <section id="records">
      <h2>記録一覧</h2>
      <table id="record-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>ステージ</th>
            <th>キケン度</th>
            <th>金イクラ</th>
            <th>結果</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="stats">
      <h2>統計</h2>
      <div id="stats-container"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
