  <style>
    #grading-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .grading-card {
      background: #243556;
      border-radius: 8px;
      padding: 1.0rem;
      margin: 0;
      position: relative;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    .grading-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('png/bg_card.png') center/cover no-repeat;
      z-index: 0;
    }
    .grading-card > * {
      position: relative;
      z-index: 1;
    }

    /* ホログラムカード（オールランダム編成） */
    .grading-card-holo::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2;
      background: linear-gradient(
        135deg,
        rgba(255,0,128,0.0) 0%,
        rgba(255,0,128,0.12) 15%,
        rgba(0,200,255,0.12) 30%,
        rgba(100,255,100,0.10) 45%,
        rgba(255,200,0,0.12) 60%,
        rgba(200,0,255,0.12) 75%,
        rgba(255,0,128,0.0) 100%
      );
      background-size: 300% 300%;
      animation: holoShimmer 4s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    @keyframes holoShimmer {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }
    .grading-card-holo {
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    /* 黄金カード */
    .grading-card-golden {
      background: linear-gradient(160deg, #2a1f00 0%, #3d2e00 30%, #4a3800 50%, #3d2e00 70%, #2a1f00 100%);
      border: 1.5px solid rgba(255,215,0,0.35);
    }
    .grading-card-golden::after {
      content: "";
      position: absolute;
      top: 0; left: -100%; right: 0; bottom: 0;
      width: 300%;
      z-index: 2;
      background: linear-gradient(
        110deg,
        rgba(255,215,0,0.0) 0%,
        rgba(255,215,0,0.0) 35%,
        rgba(255,230,100,0.07) 42%,
        rgba(255,255,200,0.1) 50%,
        rgba(255,230,100,0.07) 58%,
        rgba(255,215,0,0.0) 65%,
        rgba(255,215,0,0.0) 100%
      );
      animation: goldenShine 10s linear infinite;
      pointer-events: none;
      will-change: transform;
    }
    @keyframes goldenShine {
      0% { transform: translateX(-33%); }
      40% { transform: translateX(33%); }
      100% { transform: translateX(33%); }
    }
    /* ビッグラン+黄金: ホログラムが光エフェクトを上書き */
    .grading-card-golden.grading-card-holo::after {
      left: 0;
      width: auto;
      background: linear-gradient(
        135deg,
        rgba(255,0,128,0.0) 0%,
        rgba(255,0,128,0.12) 15%,
        rgba(0,200,255,0.12) 30%,
        rgba(100,255,100,0.10) 45%,
        rgba(255,200,0,0.12) 60%,
        rgba(200,0,255,0.12) 75%,
        rgba(255,0,128,0.0) 100%
      );
      background-size: 300% 300%;
      animation: holoShimmer 4s ease-in-out infinite;
      mix-blend-mode: screen;
      transform: none;
      will-change: background-position;
    }

        bigshot: [0.5, 0.25, 0.25],

        drizzler: [0.35, 0.35, 0.3],
        // バクダン: 上位2人が対応できるのが望ましい
        steelhead: [0.5, 0.4, 0.1],
      };
      if (bossDanger) {
        var weightedSum = 0, dangerTotal = 0;
        for (var bossJP in bossDanger) {
          var bossKey = BOSS_KEY[bossJP];
          var danger = bossDanger[bossJP];
          dangerTotal += danger;
          // 4武器のマッチアップを収集してソート(降順)
          var matches = [];
          for (var j = 0; j < weapons.length; j++) {
            if (weapons[j] === "？") {
              // ランダム枠: 全武器のこのボスに対する平均値
              var bSum = 0, bCnt = 0;
              for (var wn2 in BOSS_MATCHUPS) {
                var bm2 = BOSS_MATCHUPS[wn2];
                if (bm2 && bm2[bossKey] !== undefined) { bSum += bm2[bossKey]; bCnt++; }
              }
              if (bCnt > 0) matches.push(bSum / bCnt);
            } else {
              var bm = BOSS_MATCHUPS[weapons[j]];
              if (bm && bm[bossKey] !== undefined) {
                matches.push(bm[bossKey]);
              }
            }
          }
          matches.sort(function(a, b) { return b - a; });
          if (matches.length > 0) {
            var evalWeights = BOSS_EVAL[bossKey] || [0.7, 0.3];
            var bossVal = weightedAvg(matches, evalWeights);
            weightedSum += danger * bossVal;
            bossDetail[bossJP] = bossVal;
          }
          // ペナルティ: 危険度S(6)以上のボスで対応不足
          if (danger >= 6 && matches.length > 0) {
            if (matches[0] <= 2) {
              bossPenalty += danger * 3;
            }
            var goodCount = matches.filter(function(m) { return m >= 3; }).length;
            if (goodCount < 2) {
              bossPenalty += danger * 1.5;
            }
          }
        }
        if (dangerTotal > 0) {
          var rawAvg = weightedSum / dangerTotal;
          bossScore = ((rawAvg - 1) / 4) * 100;
          bossScore = Math.max(0, bossScore - bossPenalty);
        }
      }

      // 実行力ペナルティ: 機動力+扱いやすさが低いとボスと射程が額面通りに発揮されない
      var mobPct = (avgMobility - METRIC_RANGE.mobility.min) / (METRIC_RANGE.mobility.max - METRIC_RANGE.mobility.min);
      var hdlPct = (avgHandling - METRIC_RANGE.handling.min) / (METRIC_RANGE.handling.max - METRIC_RANGE.handling.min);
      var practicalPct = mobPct * 0.3 + hdlPct * 0.7;
      var PRAC_THRESHOLD = 0.65, PRAC_STRENGTH = 1.9, PRAC_FLOOR = 0.3;
      var pracPenalty = 1.0;
      if (practicalPct < PRAC_THRESHOLD) {
        pracPenalty = Math.max(PRAC_FLOOR, 1 - (PRAC_THRESHOLD - practicalPct) * PRAC_STRENGTH);
      }
      var rawBossScore = bossScore;
      var rawRange = avgRange;
      bossScore *= pracPenalty;
      avgRange *= pracPenalty;

      // ステージ配分による加重合算
      var baseScore = avgClearing * (weights.clearing / 100)
                    + avgPaint * (weights.paint / 100)
                    + bossScore * (weights.boss / 100)
                    + avgMobility * (weights.mobility / 100)
                    + avgHandling * (weights.handling / 100);

      // ステージ難易度係数
      var diff = STAGE_DIFFICULTY[stage] || DIFF_MIN;
      var coeff = 1 - ((diff - DIFF_MIN) / (DIFF_MAX - DIFF_MIN)) * DIFF_PENALTY;
      var rawTotal = (baseScore * 0.9 + avgRange * 0.1) * coeff;

      // 0-100正規化（全ステージ共通スケール）
      var total = Math.max(0, Math.min(100, (rawTotal - SCORE_MIN) / (SCORE_MAX - SCORE_MIN) * 100));

      return {
        total: total,
        clearing: avgClearing,
        paint: avgPaint,
        boss: rawBossScore,
        mobility: avgMobility,
        handling: avgHandling,
        range: rawRange,
        coefficient: coeff,
        bossDetail: bossDetail,
        stage: stage
      };
    }

    var DAY_NAMES = ["日", "月", "火", "水", "木", "金", "土"];

    // 日時文字列をDateに変換 "03/16 09:00" + year → Date
    function parseScheduleDate(dateStr, year) {
      var parts = dateStr.match(/(\d+)\/(\d+)\s+(\d+):(\d+)/);
      if (!parts) return null;
      var m = parseInt(parts[1]), d = parseInt(parts[2]);
      var h = parseInt(parts[3]), min = parseInt(parts[4]);
      return new Date(year, m - 1, d, h, min);
    }

    // 採点可能な編成を取得（ランダム・黄金を除外）
    // 古い順、開催中を先頭、未来も含む
    function findGradableSchedules() {
      var data = typeof SCHEDULE_DATA !== "undefined" ? SCHEDULE_DATA : [];
      var now = new Date();
      var gradable = [];
      for (var i = 0; i < data.length; i++) {
        var r = data[i];
        // 単一ランダム含む全編成を対象（部分ランダムも表示）
        gradable.push(r);
      }
      // 開催中・過去・未来を分類
      var active = [], past = [], future = [];
      for (var j = 0; j < gradable.length; j++) {
        var rec = gradable[j];
        var startYear = rec.year;
        var start = parseScheduleDate(rec.startDate, startYear);
        var endMonth = parseInt(rec.endDate.match(/(\d+)\//)[1]);
        var startMonth = parseInt(rec.startDate.match(/(\d+)\//)[1]);
        var endYear = (endMonth < startMonth) ? startYear + 1 : startYear;
        var end = parseScheduleDate(rec.endDate, endYear);
        if (start && end && now >= start && now < end) {
          active.push(rec);
        } else if (start && now < start) {
          future.push(rec);
        } else {
          past.push(rec);
        }
      }
      // 開催中 → 未来（古い順）
      return active.concat(future);
    }

    // "03/16 09:00" + year → "3/16(月) 9:00"
    function formatDate(dateStr, year) {
      var parts = dateStr.match(/(\d+)\/(\d+)\s+(\d+):(\d+)/);
      if (!parts) return dateStr;
      var m = parseInt(parts[1]), d = parseInt(parts[2]);
      var h = parseInt(parts[3]), min = parts[4];
      var dt = new Date(year, m - 1, d, h, parseInt(min));
      var dow = DAY_NAMES[dt.getDay()];
      return m + "/" + d + "(" + dow + ") " + h + ":" + min;
    }

    // 共通ティア色判定（丸めた後の値で判定）
    function tierColor(score) {
      var v = Math.round(score * 10) / 10; // .toFixed(1)と同じ丸め
      if (v >= 80) return "#ff2496";
      if (v >= 70) return "#c77dff";
      if (v >= 60) return "#4a90d9";
      if (v >= 50) return "#e0e0e0";
      if (v >= 35) return "#ff6b35";
      return "#ff4444";
    }

        var metricRaw = [grade.clearing, grade.paint, grade.mobility, grade.handling, grade.range];
        for (var k = 0; k < metricKeys.length; k++) {

          var rounded = Math.round(pct);

        var BOSS_ICON_MAP = {stinger:"salmon_stinger.png",drizzler:"salmon_drizzler.png",fishstick:"salmon_fishstick.png",flyfish:"salmon_flyfish.png",steeleel:"salmon_steeleel.png",bigshot:"salmon_bigshot.png",scrapper:"salmon_scrapper.png",slamminlid:"salmon_slamminlid.png",steelhead:"salmon_steelhead.png",maws:"salmon_maws.png",flipper:"salmon_flipper-flopper.png"};

    function render() {
      var container = document.getElementById("grading-container");
      var recs = findGradableSchedules();
      if (recs.length === 0) {
        container.textContent = "データがありません";
        return;
      }

      var dividers = [];
      for (var i = 0; i < recs.length; i++) {
        dividers.push(renderCard(container, recs[i]));
      }
      // オカシラ区切り線も含めて全dividerを収集
      var allDividers = dividers.slice();
      var cards = container.querySelectorAll(".grading-card");
      for (var ci = 0; ci < cards.length; ci++) {
        if (cards[ci]._extraDividers) {
          for (var ei = 0; ei < cards[ci]._extraDividers.length; ei++) {
            allDividers.push(cards[ci]._extraDividers[ei]);
          }
        }
      }

      function relayoutAll() {
        for (var j = 0; j < allDividers.length; j++) {
          layoutDots(allDividers[j]);
        }
      }
      relayoutAll();
      window.addEventListener("resize", relayoutAll);
    }

    function layoutDots(el) {
      var vw = window.innerWidth;
      var DOT_COUNT;
      if (vw <= 400) DOT_COUNT = 32;
      else if (vw <= 450) DOT_COUNT = 36;
      else if (vw <= 500) DOT_COUNT = 40;
      else if (vw <= 600) DOT_COUNT = 48;
      else if (vw <= 700) DOT_COUNT = 54;
      else DOT_COUNT = 60;
      var w = el.offsetWidth;
      if (w === 0) return;
      // dot幅 : gap幅 = 2 : 1
      var unit = w / (DOT_COUNT * 3 - 1);
      var dotW = unit * 2;
      var gapW = unit;
      el.innerHTML = "";
      for (var i = 0; i < DOT_COUNT; i++) {
        var dot = document.createElement("div");
        dot.className = "grading-dot";
        dot.style.width = dotW + "px";
        el.appendChild(dot);
        if (i < DOT_COUNT - 1) {
          var gap = document.createElement("div");
          gap.className = "grading-gap";
          gap.style.width = gapW + "px";
          el.appendChild(gap);
        }
      }
    }

    // --- ツールチップ ---
    (function() {
      var tip = document.createElement("div");
      tip.id = "tooltip";
      document.body.appendChild(tip);

      function showTip(wrap) {
        tip.textContent = wrap.dataset.tooltip;
        tip._currentWrap = wrap;
        tip.classList.add("visible");
        var rect = wrap.getBoundingClientRect();
        var tipW = tip.offsetWidth;
        var left = rect.left + rect.width / 2 - tipW / 2;
        if (left < 4) left = 4;
        if (left + tipW > window.innerWidth - 4) left = window.innerWidth - 4 - tipW;
        tip.style.left = left + window.scrollX + "px";
        tip.style.top = rect.top + window.scrollY - tip.offsetHeight - 6 + "px";
      }

      document.addEventListener("mouseover", function(e) {
        var w = e.target.closest(".icon-wrap");
        if (w) showTip(w);
      });
      document.addEventListener("mouseout", function(e) {
        if (e.target.closest(".icon-wrap")) tip.classList.remove("visible");
      });
      document.addEventListener("click", function(e) {
        var w = e.target.closest(".icon-wrap");
        if (w) {
          e.stopPropagation();
          if (tip.classList.contains("visible") && tip._currentWrap === w) tip.classList.remove("visible");
          else showTip(w);
        } else tip.classList.remove("visible");
      });
      document.addEventListener("touchend", function(e) {
        var w = e.target.closest(".icon-wrap");
        if (w) {
          e.preventDefault();
          if (tip.classList.contains("visible") && tip._currentWrap === w) tip.classList.remove("visible");
          else showTip(w);
        } else tip.classList.remove("visible");
      });
    })();

    render();
  })();
  </script>
</body>
</html>
