name: Update Salmon Run Schedules

on:
  schedule:
    # 各切替(JST 9:00/17:00/1:00)の -121,-61,-31,-16,+6,+31,+61分
    - cron: '59 5,13,21 * * *'
    - cron: '59 6,14,22 * * *'
    - cron: '29 7,15,23 * * *'
    - cron: '44 7,15,23 * * *'
    - cron: '6 0,8,16 * * *'
    - cron: '31 0,8,16 * * *'
    - cron: '1 1,9,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and merge schedules
        run: node scripts/merge_api_schedules.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/salmon_history.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/salmon_history.json js/schedule_data.js
          git commit -m "開催履歴を自動更新"
          git push
