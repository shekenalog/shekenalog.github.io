<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>オカシラ確率 - シェケナログ</title>
  <meta name="description" content="サーモンランのオカシラシャケ遭遇率を計算。4人のキケン度を入力して出現確率を確認。">
  <meta property="og:title" content="オカシラ確率 - シェケナログ">
  <meta property="og:description" content="サーモンランのオカシラシャケ遭遇率を計算。4人のキケン度を入力して出現確率を確認。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shekenalog.github.io/boss.html">
  <meta property="og:image" content="https://shekenalog.github.io/icon-512.png">
  <meta property="og:site_name" content="シェケナログ">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="オカシラ確率 - シェケナログ">
  <meta name="twitter:description" content="サーモンランのオカシラシャケ遭遇率を計算。4人のキケン度を入力して出現確率を確認。">
  <meta name="twitter:image" content="https://shekenalog.github.io/icon-512.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* --- カード背景 --- */
    section {
      background: #243556;
      border-radius: 8px;
      padding: 1.0rem;
      position: relative;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    section::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('png/bg_card.png') center/cover no-repeat;
      z-index: 0;
    }
    section > * {
      position: relative;
      z-index: 1;
    }

    /* --- パーティ入力 --- */
    .party-section {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 1rem 0;
    }
    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .player-card img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }
    .player-label {
      display: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: normal;
      font-family: "Splatfont2", "Segoe UI", "Hiragino Sans", sans-serif;
    }
    .smell-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .smell-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #444;
      border-radius: 6px;
      background: #1a1a2e;
      color: #ccc;
      font-size: 1.1rem;
      font-family: Consolas, monospace;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .smell-btn.active {
      background: #ff6b35;
      border-color: #ff6b35;
      color: #fff;
      font-weight: bold;
    }

.pct-sign {
      font-size: 0.8em;
      margin-left: 0.15em;
    }

    /* --- 結果表示 --- */
    .result-display {
      text-align: center;
      padding: 0;
      margin-top: 2rem;
    }
    .result-percent {
      font-size: 2.4rem;
      font-weight: normal;
      color: #ff6b35;
      font-family: "Splatfont2", Consolas, monospace;
      text-shadow: 2px 2px 0 #000;
      -webkit-text-stroke: 0;
    }

    /* --- ゲージ --- */
    .boss-gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }
    .boss-gauge {
      position: relative;
      width: 360px;
      height: 360px;
    }
    .boss-gauge img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .boss-gauge-fill {
      clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
    }

    /* --- レスポンシブ --- */
    @media (max-width: 780px) {
      .boss-gauge { width: 300px; height: 300px; }
      .player-card img { width: 90px; height: 90px; }
      .result-percent { font-size: 2.2rem; text-shadow: 1.81px 1.81px 0 #000; }
      .result-display { margin-top: 2rem; }
    }
    @media (max-width: 600px) {
      .boss-gauge { width: 200px; height: 200px; }
      .party-section {
        display: grid;
        grid-template-columns: repeat(2, auto);
        justify-content: center;
        gap: 1rem 2rem;
      }
      .player-card img { width: 80px; height: 80px; }
      .smell-btn { width: 34px; height: 34px; font-size: 0.9rem; }
      .result-percent { font-size: 1.8rem; text-shadow: 1.56px 1.56px 0 #000; }
      .result-display { margin-top: 1.5rem; }
    }
    @media (max-width: 450px) {
      .boss-gauge { width: 160px; height: 160px; }
      .player-card img { display: none; }
      .player-label { display: block; }
      .player-card { gap: 0.3rem; }
      .result-percent { font-size: 1.6rem; text-shadow: 1.25px 1.25px 0 #000; }
      .result-display { margin-top: 0.8rem; }
    }
  </style>
</head>
<body>
  <header class="header-inline">
    <a href="index.html" class="back-link"><img src="png/btn_prev.png" alt="トップへ" class="back-btn-img"></a>
    <h1>オカシラ確率</h1>
  </header>

  <main>
    <section>
      <!-- パーティ入力 -->
      <div class="party-section" id="party-section"></div>

      <!-- 結果 -->
      <div class="result-display">
        <div class="result-percent" id="result-percent">0.00<span class="pct-sign">%</span></div>
      </div>

      <!-- ゲージ -->
      <div class="boss-gauge-wrap">
        <div class="boss-gauge">
          <img src="png/value_boss_null.png" alt="" class="boss-gauge-null">
          <img src="png/value_boss_fill.png" alt="" class="boss-gauge-fill" id="gauge-fill">
        </div>
      </div>
    </section>
  </main>

  <script>
  (function() {
    // --- テーブル: 合計値 → 遭遇率% ---
    var SMELL_TABLE = [
      0, 0, 0, 0, 0,               // 0-4
      1.5625, 3.75, 6.5625, 10,    // 5-8
      14.0625, 18.75, 24.0625, 30, // 9-12
      36.5625, 43.75, 51.5625, 60, // 13-16
      69.0625, 78.75, 89.0625, 100 // 17-20
    ];

    var playerValues = [0, 0, 0, 0];
    var fill = document.getElementById("gauge-fill");
    var resultPercent = document.getElementById("result-percent");

    // --- パーティUI生成 ---
    var partySection = document.getElementById("party-section");
    for (var p = 0; p < 4; p++) {
      var card = document.createElement("div");
      card.className = "player-card";

      var img = document.createElement("img");
      img.src = "png/gloopsuit_0" + (p + 1) + ".png";
      img.alt = "Player " + (p + 1);
      card.appendChild(img);

      var label = document.createElement("span");
      label.className = "player-label";
      label.textContent = "プレイヤー " + (p + 1);
      card.appendChild(label);

      var btns = document.createElement("div");
      btns.className = "smell-buttons";
      for (var v = 0; v <= 5; v++) {
        var btn = document.createElement("button");
        btn.className = "smell-btn" + (v === 0 ? " active" : "");
        btn.textContent = v;
        btn.dataset.player = p;
        btn.dataset.value = v;
        btn.addEventListener("click", onSmellClick);
        btns.appendChild(btn);
      }
      card.appendChild(btns);
      partySection.appendChild(card);
    }

    function onSmellClick(e) {
      var p = parseInt(e.target.dataset.player);
      var v = parseInt(e.target.dataset.value);
      playerValues[p] = v;

      // ボタンのactive切替
      var siblings = e.target.parentNode.children;
      for (var i = 0; i < siblings.length; i++) {
        siblings[i].classList.remove("active");
      }
      e.target.classList.add("active");

      updateResult();
    }

    function updateResult() {
      var sum = 0;
      for (var i = 0; i < 4; i++) sum += playerValues[i];
      var pct = SMELL_TABLE[Math.min(sum, 20)];
      resultPercent.innerHTML = pct.toFixed(2) + '<span class="pct-sign">%</span>';
      targetLevel = pct;
    }

    // --- ゲージアニメーション ---
    var phase = 0;
    var currentLevel = 0;
    var targetLevel = 0;
    var WAVE_AMP = 3;
    var WAVE_POINTS = 40;
    var LERP = 0.08;
    var CONTENT_TOP = 8.2;
    var CONTENT_BOTTOM = 91.6;

    function buildWavePath(level, phase) {
      var contentHeight = CONTENT_BOTTOM - CONTENT_TOP + WAVE_AMP * 2;
      var mappedY = (CONTENT_BOTTOM + WAVE_AMP) - (level / 100) * contentHeight;
      var points = [];
      for (var i = 0; i <= WAVE_POINTS; i++) {
        var x = (i / WAVE_POINTS) * 100;
        var amp = (level > 0 && level < 100) ? WAVE_AMP : 0;
        var y = mappedY + Math.sin((i / WAVE_POINTS) * Math.PI * 4 + phase) * amp;
        points.push(x.toFixed(1) + "% " + y.toFixed(1) + "%");
      }
      points.push("100% 100%");
      points.push("0% 100%");
      return "polygon(" + points.join(", ") + ")";
    }

    function animate() {
      phase += 0.04;
      currentLevel += (targetLevel - currentLevel) * LERP;
      fill.style.clipPath = buildWavePath(currentLevel, phase);
      requestAnimationFrame(animate);
    }

    animate();
  })();
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase_config.js"></script>
  <script src="js/auth_ui.js"></script>
</body>
</html>
